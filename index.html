<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FactVerse</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    color:white;
    padding:20px;
    transition:0.3s;
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

h1{
    font-size:2rem;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#38bdf8;
    color:white;
    font-weight:bold;
}

.search-box{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin:20px 0;
    font-size:16px;
}

.categories{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.category{
    background:#1e293b;
    padding:8px 15px;
    border-radius:20px;
    cursor:pointer;
}

.fact-card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
    transition:.3s;
}

.fact-card:hover{
    transform:translateY(-3px);
}

.category-label{
    color:#38bdf8;
    font-size:12px;
    margin-bottom:8px;
}
</style>
</head>

<body>

<header>
<h1>🌌 FactVerse</h1>
<button onclick="toggleTheme()">🌙 Mode</button>
</header>

<input
type="text"
class="search-box"
id="search"
placeholder="Search facts..."
onkeyup="searchFacts()"
>

<div class="categories">
<div class="category" onclick="filterCategory('All')">All</div>
<div class="category" onclick="filterCategory('Animals')">Animals</div>
<div class="category" onclick="filterCategory('Space')">Space</div>
<div class="category" onclick="filterCategory('Human Body')">Human Body</div>
<div class="category" onclick="filterCategory('History')">History</div>
</div>

<button onclick="randomFact()">🎲 Random Fact</button>

<br><br>

<div id="facts-container"></div>

<script>

const facts = [

{
category:"Space",
text:"Neutron stars can spin over 600 times per second."
},

{
category:"Animals",
text:"A shrimp's heart is located in its head."
},

{
category:"Human Body",
text:"Your stomach gets a new lining every few days."
},

{
category:"Animals",
text:"A group of flamingos is called a flamboyance."
},

{
category:"Space",
text:"Jupiter is so large that all other planets could fit inside it."
},

{
category:"History",
text:"Cleopatra lived closer to the Moon landing than to the construction of the Great Pyramid."
},

{
category:"Human Body",
text:"You produce enough saliva in a lifetime to fill two swimming pools."
},

{
category:"Animals",
text:"Octopuses have three hearts."
},

{
category:"Animals",
text:"A giraffe's tongue can be up to 20 inches long."
},

{
category:"Space",
text:"One day on Venus is longer than one year on Venus."
},

{
category:"Human Body",
text:"Your brain uses about 20% of your body's energy."
},

{
category:"History",
text:"Ancient Romans used urine as a cleaning product."
}

];

let dark = true;

function displayFacts(list){

const container = document.getElementById("facts-container");

container.innerHTML = "";

list.forEach(fact=>{

container.innerHTML += `
<div class="fact-card">
<div class="category-label">${fact.category}</div>
${fact.text}
</div>
`;

});

}

displayFacts(facts);

function searchFacts(){

const search = document
.getElementById("search")
.value
.toLowerCase();

const filtered = facts.filter(f =>
f.text.toLowerCase().includes(search)
);

displayFacts(filtered);

}

function filterCategory(category){

if(category==="All"){
displayFacts(facts);
return;
}

const filtered = facts.filter(f =>
f.category===category
);

displayFacts(filtered);

}

function randomFact(){

const fact =
facts[Math.floor(Math.random()*facts.length)];

alert(fact.text);

}

function toggleTheme(){

const cards = document.querySelectorAll(".fact-card");

if(dark){

document.body.style.background="#ffffff";
document.body.style.color="#111111";

cards.forEach(card=>{
card.style.background="#eeeeee";
});

dark=false;

}else{

document.body.style.background="#0f172a";
document.body.style.color="#ffffff";

cards.forEach(card=>{
card.style.background="#1e293b";
});

dark=true;

}

}

</script>

</body>
</html>
